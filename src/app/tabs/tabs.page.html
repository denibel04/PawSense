<ion-tabs>
  <ion-tab-bar slot="bottom">
    
    <ion-tab-button tab="tab1" href="/tabs/tab1" #tab1>
      <ion-icon [name]="tab1.selected ? 'images' : 'images-outline'"></ion-icon>
      <ion-label>Explorar</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab2" href="/tabs/tab2" #tab2>
      <ion-icon [name]="tab2.selected ? 'camera' : 'camera-outline'"></ion-icon>
      <ion-label>Cámara</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab3" href="/tabs/tab3" #tab3>
      <ion-icon [name]="tab3.selected ? 'chatbubble' : 'chatbubble-outline'"></ion-icon>
      <ion-label>Chat</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab4" href="/tabs/tab4" #tab4>
      <ion-icon [name]="tab4.selected ? 'document-text' : 'document-text-outline'"></ion-icon>
      <ion-label>Reportes</ion-label>
    </ion-tab-button>

  </ion-tab-bar>
</ion-tabs>
