<app-header></app-header>

<ion-content class="dashboard-content">
  <div class="main-container-v2">

    <div class="visor-card-v2" [class.active]="isRealTime" (click)="toggleRealTime()">
      <video #videoElement autoplay playsinline [hidden]="!isRealTime"></video>
      <canvas #canvasElement style="display: none;"></canvas>

      <div *ngIf="isRealTime" class="realtime-overlay-v2">
        <div *ngIf="realTimeResult" class="top-predictions-v2">
          <div *ngFor="let res of realTimeResult; let i = index" class="prediction-pill" [class.primary]="i === 0">
            {{ i === 0 ? '🏆' : i+1 }} {{ res.breed }} ({{ res.confidence }})
          </div>
        </div>
        <div *ngIf="!realTimeResult" class="scanning-pill">
          🐾 Escaneando...
        </div>
      </div>

      <div *ngIf="!isRealTime" class="camera-placeholder">
        <ion-icon name="camera-outline" class="placeholder-icon"></ion-icon>
        <p>Activa la cámara para identificar perros en tiempo real</p>
      </div>
    </div>

    <ion-button expand="block" (click)="toggleRealTime()" class="btn-modern-v2"
      [color]="isRealTime ? 'danger' : 'primary'">
      <ion-icon slot="start" [name]="isRealTime ? 'stop-circle' : 'play-circle'"></ion-icon>
      {{ isRealTime ? 'Detener Cámara' : 'Iniciar Escaneo' }}
    </ion-button>

  </div>
</ion-content>
