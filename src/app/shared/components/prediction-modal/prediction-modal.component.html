<ion-content class="ion-padding custom-modal">

  <div class="hero-image-container" *ngIf="breedInfo?.image_url">
    <img [src]="breedInfo.image_url" class="breed-hero-img" alt="Dog Breed">
    <div class="fade-to-white"></div>
  </div>

  <div class="header-section" *ngIf="winner">
    <div class="title-block">
      <h1 class="breed-name">{{ winner.breed_es }}</h1>
    </div>
    <div class="match-circle">
      <span class="percent">{{ winner.confidence.toFixed(0) }}%</span>
      <span class="label">MATCH</span>
    </div>
  </div>

  <div class="temperament-row" *ngIf="formattedTemps.length > 0">
    <div *ngFor="let temp of formattedTemps" [class]="'temp-card ' + temp.group">
      <ion-icon [name]="temp.icon"></ion-icon>
      <span>{{ temp.esp | uppercase }}</span>
    </div>
  </div>
  <!--
  <div class="about-section" *ngIf="breedInfo?.description">
    <h2 class="section-title">Sobre la raza</h2>
    <p class="description-text">{{ breedInfo.description }}</p>
  </div>
 -->
  <div class="info-grid" *ngIf="breedInfo">

  
  <div class="info-card">
    <span class="card-label">RANGO DE PESO</span>
    <span class="card-value">
      <span [innerHTML]="formatMetric(breedInfo.weight_metric)"></span> kg
    </span>
  </div>

  <div class="info-card">
    <span class="card-label">RANGO DE ALTURA</span>
    <span class="card-value">
      <span [innerHTML]="formatMetric(breedInfo.height_metric)"></span> cm
    </span>
  </div>

  <div class="info-card life-span-card" *ngIf="breedInfo.life_span && breedInfo.life_span !== 'None'">
    <span class="card-label">ESPERANZA DE VIDA</span>
    <span class="card-value">{{ breedInfo.life_span.replace('-', ' - ') }} años</span>
  </div>

</div>
  <div class="ai-button-container">
    <ion-button expand="block" fill="clear" class="ai-chat-btn">
      <div class="ai-content">
        <div class="ai-icon-bg">
          <ion-icon name="chatbubble-ellipses-outline"></ion-icon>
        </div>
        <div class="ai-text">
          <strong>Pregunta a la IA sobre {{ winner.breed_es }}</strong>
          <span>Entrenamiento, dieta y cuidados</span>
        </div>
        <ion-icon name="open-outline" class="external-icon"></ion-icon>
      </div>
    </ion-button>
  </div>

  <ion-button expand="block" fill="outline" color="medium" class="share-btn">
    <ion-icon name="share-social-outline" slot="start"></ion-icon>
    Compartir
  </ion-button>
</ion-content>
