<ion-card>
    <ion-card-header>
        <ion-card-title>Información de Entrenamiento</ion-card-title>
    </ion-card-header>

    <ion-card-content>
        <ion-item lines="full">
            <ion-label position="stacked">Nombre del Perro</ion-label>
            <ion-input [(ngModel)]="trainingData.dogName" placeholder="Ej. Max"></ion-input>
            <ion-button fill="clear" slot="end" (click)="toggleDictation('dogName')"
                [color]="isDictating ? 'danger' : 'primary'">
                <ion-icon name="mic" slot="icon-only"></ion-icon>
            </ion-button>
        </ion-item>

        <ion-item lines="full">
            <ion-label position="stacked" class="ion-margin-bottom">Fecha de Sesión</ion-label>
            <ion-datetime-button datetime="session-datetime"></ion-datetime-button>
            <ion-modal [keepContentsMounted]="true">
                <ng-template>
                    <ion-datetime id="session-datetime" presentation="date"
                        [(ngModel)]="trainingData.sessionDate"></ion-datetime>
                </ng-template>
            </ion-modal>
        </ion-item>

        <ion-item lines="full">
            <ion-label position="stacked">Duración (minutos)</ion-label>
            <ion-input type="number" [(ngModel)]="trainingData.duration" placeholder="Ej. 45"></ion-input>
            <ion-button fill="clear" slot="end" (click)="toggleDictation('duration')"
                [color]="isDictating ? 'danger' : 'primary'">
                <ion-icon name="mic" slot="icon-only"></ion-icon>
            </ion-button>
        </ion-item>

        <ion-item lines="full">
            <ion-label position="stacked">Comandos Trabajados</ion-label>
            <ion-textarea [(ngModel)]="trainingData.commandsWorkingOn" autoGrow="true" rows="2"
                placeholder="Ej. Sentado, Quieto"></ion-textarea>
            <ion-button fill="clear" slot="end" (click)="toggleDictation('commandsWorkingOn')"
                [color]="isDictating ? 'danger' : 'primary'">
                <ion-icon name="mic" slot="icon-only"></ion-icon>
            </ion-button>
        </ion-item>

        <ion-item lines="full">
            <ion-label position="stacked">Comportamiento / Notas</ion-label>
            <ion-textarea [(ngModel)]="trainingData.behaviorNotes" autoGrow="true" rows="3"
                placeholder="Comportamiento del perro durante la sesión..."></ion-textarea>
            <ion-button fill="clear" slot="end" (click)="toggleDictation('behaviorNotes')"
                [color]="isDictating ? 'danger' : 'primary'">
                <ion-icon name="mic" slot="icon-only"></ion-icon>
            </ion-button>
        </ion-item>

        <div class="ion-padding-top">
            <ion-button expand="block" shape="round">Guardar Reporte</ion-button>
        </div>
    </ion-card-content>
</ion-card>
