<div class="preview-container">
    <div class="preview-header">
        <h3 class="preview-title">Informe Veterinario</h3>
    </div>

    <!-- VISTA PREVIA LECTURA -->
    <ion-grid *ngIf="!isEditing" class="preview-grid ion-no-padding">
        <ion-row>
            <!-- LEFT COLUMN: Clinical Data -->
            <ion-col size-xs="12" size-md="4" class="data-column">
                <div class="data-section">
                    <p><strong>Síntomas:</strong> <span class="data-value">
                            <ng-container *ngFor="let s of data.symptoms; let last = last">
                                {{s}}{{last ? '' : ', '}}
                            </ng-container>
                            <span *ngIf="!data.symptoms || data.symptoms.length === 0">—</span>
                        </span></p>
                    <p><strong>Diagnóstico:</strong> <span class="data-value">{{ data.diagnosis || '—' }}</span></p>
                    <p><strong>Tratamiento:</strong> <span class="data-value">{{ data.treatment || '—' }}</span></p>
                    <p><strong>Notas:</strong> <span class="data-value muted">{{ data.notes || '—' }}</span></p>
                </div>
            </ion-col>

            <!-- MIDDLE COLUMN: Triage & Diferenciales -->
            <ion-col size-xs="12" size-md="4" class="section-column">
                <div class="report-section">
                    <h4 class="section-title">
                        <span class="orange-dot">●</span> Triage
                    </h4>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line" [style.width.%]="70"></div>
                </div>
                <!-- ... -->
            </ion-col>

            <ion-col size-xs="12" size-md="4" class="section-column">
                <div class="report-section">
                    <h4 class="section-title">
                        <span class="orange-dot">●</span> Recomendaciones
                    </h4>
                    <div class="skeleton-line"></div>
                </div>
            </ion-col>
        </ion-row>
    </ion-grid>

    <!-- FORMULARIO DE EDICIÓN -->
    <div *ngIf="isEditing" class="edit-form-container" style="padding: 10px;">
        <ion-list lines="none" style="background: transparent;">

            <h4 class="section-title" style="margin-left: 15px;"><span class="orange-dot">●</span> Síntomas</h4>
            <div *ngFor="let s of data.symptoms; let i = index; trackBy: trackByIndex"
                style="display: flex; align-items: center; margin-bottom: 5px; padding-left: 15px;">
                <ion-input [name]="'symptom_' + i" [value]="data.symptoms[i]"
                    (ionInput)="data.symptoms[i] = ($event.detail.value ?? '')" fill="outline"
                    style="background: white; border-radius: 4px; --padding-start: 10px;">
                </ion-input>
                <ion-button fill="clear" color="danger" (click)="data.symptoms.splice(i, 1)" style="margin-left: 5px;">
                    <ion-icon name="close-outline"></ion-icon>
                </ion-button>
            </div>
            <div style="padding-left: 15px;">
                <ion-button fill="outline" size="small" (click)="data.symptoms.push('')">+ Añadir Síntoma</ion-button>
            </div>

            <ion-item style="--background: transparent; margin-top: 15px;">
                <ion-label position="stacked">Diagnóstico</ion-label>
                <ion-input name="diagnosis" [value]="data.diagnosis"
                    (ionInput)="data.diagnosis = ($event.detail.value ?? '')" fill="outline"
                    style="background: white; border-radius: 4px; margin-top: 5px; --padding-start: 10px;">
                </ion-input>
            </ion-item>

            <ion-item style="--background: transparent;">
                <ion-label position="stacked">Tratamiento</ion-label>
                <ion-textarea name="treatment" [value]="data.treatment"
                    (ionInput)="data.treatment = ($event.detail.value ?? '')" [autoGrow]="true" fill="outline"
                    style="background: white; border-radius: 4px; margin-top: 5px; --padding-start: 10px;">
                </ion-textarea>
            </ion-item>

            <ion-item style="--background: transparent;">
                <ion-label position="stacked">Notas Adicionales</ion-label>
                <ion-textarea name="notes" [value]="data.notes" (ionInput)="data.notes = ($event.detail.value ?? '')"
                    [autoGrow]="true" fill="outline"
                    style="background: white; border-radius: 4px; margin-top: 5px; --padding-start: 10px;">
                </ion-textarea>
            </ion-item>

        </ion-list>
    </div>
</div>
