<ion-card>
    <ion-card-header>
        <ion-card-title>Información Clínica</ion-card-title>
    </ion-card-header>

    <ion-card-content>
        <ion-item lines="full">
            <ion-label position="stacked">Nombre del Perro</ion-label>
            <ion-input [(ngModel)]="clinicalData.dogName" placeholder="Ej. Max"></ion-input>
            <ion-button fill="clear" slot="end" (click)="toggleDictation('dogName')"
                [color]="isDictating ? 'danger' : 'primary'">
                <ion-icon name="mic" slot="icon-only"></ion-icon>
            </ion-button>
        </ion-item>

        <ion-item lines="full">
            <ion-label position="stacked" class="ion-margin-bottom">Fecha de Visita</ion-label>
            <ion-datetime-button datetime="visit-datetime"></ion-datetime-button>
            <ion-modal [keepContentsMounted]="true">
                <ng-template>
                    <ion-datetime id="visit-datetime" presentation="date"
                        [(ngModel)]="clinicalData.visitDate"></ion-datetime>
                </ng-template>
            </ion-modal>
        </ion-item>

        <ion-item lines="full">
            <ion-label position="stacked">Peso (kg)</ion-label>
            <ion-input type="number" [(ngModel)]="clinicalData.weight" placeholder="Ej. 15.5"></ion-input>
            <ion-button fill="clear" slot="end" (click)="toggleDictation('weight')"
                [color]="isDictating ? 'danger' : 'primary'">
                <ion-icon name="mic" slot="icon-only"></ion-icon>
            </ion-button>
        </ion-item>

        <ion-item lines="full">
            <ion-label position="stacked">Síntomas</ion-label>
            <ion-textarea [(ngModel)]="clinicalData.symptoms" autoGrow="true" rows="2"
                placeholder="Describa los síntomas..."></ion-textarea>
            <ion-button fill="clear" slot="end" (click)="toggleDictation('symptoms')"
                [color]="isDictating ? 'danger' : 'primary'">
                <ion-icon name="mic" slot="icon-only"></ion-icon>
            </ion-button>
        </ion-item>

        <ion-item lines="full">
            <ion-label position="stacked">Diagnóstico</ion-label>
            <ion-textarea [(ngModel)]="clinicalData.diagnosis" autoGrow="true" rows="2"
                placeholder="Diagnóstico..."></ion-textarea>
            <ion-button fill="clear" slot="end" (click)="toggleDictation('diagnosis')"
                [color]="isDictating ? 'danger' : 'primary'">
                <ion-icon name="mic" slot="icon-only"></ion-icon>
            </ion-button>
        </ion-item>

        <ion-item lines="full">
            <ion-label position="stacked">Tratamiento / Medicamentos</ion-label>
            <ion-textarea [(ngModel)]="clinicalData.treatment" autoGrow="true" rows="3"
                placeholder="Plan de tratamiento..."></ion-textarea>
            <ion-button fill="clear" slot="end" (click)="toggleDictation('treatment')"
                [color]="isDictating ? 'danger' : 'primary'">
                <ion-icon name="mic" slot="icon-only"></ion-icon>
            </ion-button>
        </ion-item>

        <ion-item lines="full">
            <ion-label position="stacked">Notas Adicionales</ion-label>
            <ion-textarea [(ngModel)]="clinicalData.notes" autoGrow="true" rows="3"
                placeholder="Notas adicionales..."></ion-textarea>
            <ion-button fill="clear" slot="end" (click)="toggleDictation('notes')"
                [color]="isDictating ? 'danger' : 'primary'">
                <ion-icon name="mic" slot="icon-only"></ion-icon>
            </ion-button>
        </ion-item>

        <div class="ion-padding-top">
            <ion-button expand="block" shape="round">Guardar Reporte</ion-button>
        </div>
    </ion-card-content>
</ion-card>
